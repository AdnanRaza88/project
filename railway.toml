[services.backend]
source = "backend"
build.command = "pip install -r requirements.txt"
start.command = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[services.frontend]
source = "frontend"
build.command = "pip install -r requirements.txt"
start.command = "streamlit run ui.py --server.port $PORT --server.address 0.0.0.0"